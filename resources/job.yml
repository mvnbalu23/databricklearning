resources:
  jobs:
    end_to_end_heathcare_project_job:
      name: end-to-end-heathcare-project-job
      tasks:
        - task_key: diagnosis_raw_ingestion_task
          notebook_task:
            notebook_path: ../bronze/diagnosis_raw_data_ingestion.ipynb
            source: WORKSPACE
        - task_key: diagosis_silver_task
          depends_on:
            - task_key: diagnosis_raw_ingestion_task
          notebook_task:
            notebook_path: ../silver/dim_diagnosis_ingestion.ipynb
            source: WORKSPACE
        - task_key: hospital_raw_ingestion_task
          notebook_task:
            notebook_path: ../bronze/hospitals_raw_data_ingestion.ipynb
            source: WORKSPACE
        - task_key: hospital_silver_ingestion_task
          depends_on:
            - task_key: hospital_raw_ingestion_task
          notebook_task:
            notebook_path: ../silver/dim_hospital_ingestion.ipynb
            source: WORKSPACE
        - task_key: patients_raw_ingestion_task
          notebook_task:
            notebook_path: ../bronze/patients_raw_data_ingestion.ipynb
            source: WORKSPACE
        - task_key: patient_silver_ingestion_task
          depends_on:
            - task_key: patients_raw_ingestion_task
          notebook_task:
            notebook_path: ../silver/dim_patient_ingestion.ipynb
            source: WORKSPACE
        - task_key: visit_raw_ingestion_task
          notebook_task:
            notebook_path: ../bronze/visits_raw_data_ingestion.ipynb
            source: WORKSPACE
        - task_key: visit_silver_ingestion_task
          depends_on:
            - task_key: visit_raw_ingestion_task
            - task_key: hospital_silver_ingestion_task
            - task_key: patient_silver_ingestion_task
            - task_key: diagosis_silver_task
          notebook_task:
            notebook_path: ../silver/fact_visit_ingestion.ipynb
            source: WORKSPACE
        - task_key: resubmission_analysis
          depends_on:
            - task_key: visit_silver_ingestion_task
          notebook_task:
            notebook_path: ../gold/resubmission_analysis.ipynb
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
